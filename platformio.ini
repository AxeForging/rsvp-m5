[platformio]
default_envs = m5stack_core2

[common]
base_build_flags =
  -DCORE_DEBUG_LEVEL=3
  -std=gnu++17
  -fno-exceptions
  -fno-rtti

base_build_unflags =
  -std=gnu++11

base_src_filter =
  +<*>
  -<platforms/**>

m5stack_core2_src_filter =
  ${common.base_src_filter}
  +<platforms/m5stack_core2/**>
  ; display/power/touch are handled by M5Unified (AXP2101 Core2 v1.1)

[env]
platform = espressif32@6.3.2
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/pio_set_version.py

build_flags =
  ${common.base_build_flags}

build_unflags =
  ${common.base_build_unflags}

build_src_filter =
  ${common.base_src_filter}

;
; M5Stack Core2 v1.1 (ESP32 + ILI9342C + AXP2101 + FT6336) -- display/power/touch via M5Unified
;
[env:m5stack_core2]
board = m5stack-core2
board_build.partitions = default_16MB.csv

lib_deps =
  m5stack/M5Unified

build_src_filter =
  ${common.m5stack_core2_src_filter}

build_flags =
  ${env.build_flags}
  -DBOARD_HAS_PSRAM
  -DRSVP_BOARD_CONFIG_HEADER=\"platforms/m5stack_core2/BoardConfig.h\"
  -DRSVP_MAX_BOOK_WORDS=8000
  -DRSVP_SEED_SAMPLE_BOOK=1
  -DRSVP_SIDE_BUTTONS_ADJUST_WPM=1

;
; Native unit tests
;
[env:native_test]
platform = native
framework =
test_framework = unity
test_filter =
  test_pacing
  test_cjk
  test_feed_parser
  test_release_parser
test_build_src = yes

build_src_filter =
  -<*>
  +<reader/ReadingLoop.cpp>
  +<rss/FeedParser.cpp>
  +<update/ReleaseParser.cpp>
  +<text/TextNormalizer.cpp>
  +<text/RsvpTokenizer.cpp>

build_flags =
  -std=gnu++17
  -Itest/support
  -Isrc
