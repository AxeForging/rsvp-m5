# RSVP M5 localization source.
# Edit this file, then run localization/generate_localization.py.
# ascii_only=false: the firmware renders CJK menu/status labels via the Unicode font path.
schema_version = 1
default_language = "English"
ascii_only = false
language_order = [
	"English",
	"Spanish",
	"French",
	"German",
	"Romanian",
	"Polish",
	"Japanese",
	"Chinese",
	"Korean",
]

[languages.English]
code = "en"
name = "English"

[languages.Spanish]
code = "es"
name = "Espanol"

[languages.French]
code = "fr"
name = "Francais"

[languages.German]
code = "de"
name = "Deutsch"

[languages.Romanian]
code = "ro"
name = "Romana"

[languages.Polish]
code = "pl"
name = "Polski"

[languages.Japanese]
code = "ja"
name = "日本語"

[languages.Chinese]
code = "zh"
name = "简体中文"

[languages.Korean]
code = "ko"
name = "한국어"

